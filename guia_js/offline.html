<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563eb" />
  <title>Guia Turístico — Sem Conexão</title>
  <style>
    :root {
      --primary: #2563eb;
      --on-primary: #ffffff;
      --surface: #ffffff;
      --on-surface: #1c1b1f;
      --surface-variant: #f4f4f8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--surface-variant);
      color: var(--on-surface);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
    }

    .card {
      background: var(--surface);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 2px 6px rgba(0,0,0,.12);
    }

    .icon {
      font-size: 3.5rem;
      margin-bottom: 1.25rem;
      display: block;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: .75rem;
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      color: #5f5f72;
      margin-bottom: 1.5rem;
    }

    button {
      background: var(--primary);
      color: var(--on-primary);
      border: none;
      border-radius: 24px;
      padding: .75rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 48px;
      transition: opacity .15s;
    }

    button:hover { opacity: .88; }
    button:focus-visible { outline: 2px solid var(--primary); outline-offset: 3px; }
  </style>
</head>
<body>
  <div class="card" role="main">
    <span class="icon" aria-hidden="true">📡</span>
    <h1>Sem Conexão</h1>
    <p>
      Não foi possível conectar à internet.<br />
      Verifique sua conexão e tente novamente.
    </p>
    <button onclick="location.reload()" aria-label="Tentar novamente">
      Tentar Novamente
    </button>
  </div>
</body>
</html>
