<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects</title>
    <!-- Material 3 Roboto Font & Icons -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <!-- Material 3 baseline CSS (Expressive) -->
    <link rel="stylesheet" href="https://unpkg.com/material-web@latest/all.css" />
    <link rel="stylesheet" href="../styles/main.css" />
  </head>
  <body class="expressive-bg">
    <main class="mdc-layout-grid__inner">
      <section class="mdc-layout-grid__cell mdc-layout-grid__cell--span-8">
        <h2 class="mdc-typography--headline4 m3-expressive-primary">
          <span class="material-icons">folder_open</span> My Projects
        </h2>
        <div class="mdc-layout-grid__inner">
          <div
            class="mdc-card m3-expressive-surface mdc-layout-grid__cell mdc-layout-grid__cell--span-4"
          >
            <h3 class="mdc-typography--headline6">Project Title 1</h3>
            <p class="mdc-typography--body2">Description of Project 1. This project involves...</p>
            <a
              class="mdc-button m3-expressive-secondary"
              href="https://link-to-project1.com"
              target="_blank"
              rel="noopener noreferrer"
              >View Project</a
            >
          </div>
          <div
            class="mdc-card m3-expressive-surface mdc-layout-grid__cell mdc-layout-grid__cell--span-4"
          >
            <h3 class="mdc-typography--headline6">Project Title 2</h3>
            <p class="mdc-typography--body2">
              Description of Project 2. This project focuses on...
            </p>
            <a
              class="mdc-button m3-expressive-secondary"
              href="https://link-to-project2.com"
              target="_blank"
              rel="noopener noreferrer"
              >View Project</a
            >
          </div>
          <div
            class="mdc-card m3-expressive-surface mdc-layout-grid__cell mdc-layout-grid__cell--span-4"
          >
            <h3 class="mdc-typography--headline6">Project Title 3</h3>
            <p class="mdc-typography--body2">
              Description of Project 3. This project is designed to...
            </p>
            <a
              class="mdc-button m3-expressive-secondary"
              href="https://link-to-project3.com"
              target="_blank"
              rel="noopener noreferrer"
              >View Project</a
            >
          </div>
          <!-- Add more projects as needed -->
        </div>
      </section>
    </main>
    <!-- Material 3 JS (opcional para componentes interativos) -->
    <script type="module" src="https://unpkg.com/material-web@latest/all.js"></script>
  </body>
</html>
