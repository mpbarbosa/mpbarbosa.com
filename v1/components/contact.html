<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Me</title>
    <!-- Material 3 Roboto Font & Icons -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <!-- Material 3 baseline CSS (Expressive) -->
    <link rel="stylesheet" href="https://unpkg.com/material-web@latest/all.css" />
    <link rel="stylesheet" href="../styles/main.css" />
  </head>
  <body class="expressive-bg">
    <main class="mdc-layout-grid__inner">
      <section
        id="contact"
        class="mdc-card m3-expressive-surface mdc-layout-grid__cell mdc-layout-grid__cell--span-8"
      >
        <h2 class="mdc-typography--headline4 m3-expressive-primary">
          <span class="material-icons">mail</span> Contact Me
        </h2>
        <p class="mdc-typography--body1">
          If you have any questions or would like to get in touch, feel free to reach out!
        </p>
        <form action="#" method="post" class="mdc-form-field">
          <label for="name" class="mdc-typography--body2">Name:</label>
          <input class="mdc-text-field__input" type="text" id="name" name="name" required />
          <label for="email" class="mdc-typography--body2">Email:</label>
          <input class="mdc-text-field__input" type="email" id="email" name="email" required />
          <label for="message" class="mdc-typography--body2">Message:</label>
          <textarea
            class="mdc-text-field__input"
            id="message"
            name="message"
            rows="4"
            required
          ></textarea>
          <button class="mdc-button m3-expressive-primary" type="submit">Send Message</button>
        </form>
        <p class="mdc-typography--body2">
          You can also reach me at:
          <a href="mailto:your-email@example.com" class="mdc-button m3-expressive-secondary"
            >your-email@example.com</a
          >
        </p>
      </section>
    </main>
    <!-- Material 3 JS (opcional para componentes interativos) -->
    <script type="module" src="https://unpkg.com/material-web@latest/all.js"></script>
  </body>
</html>
